<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Results – SkillRank</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏆</text></svg>" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/animations.css" />
</head>

<body>
    <div class="bg-blob blob-1" style="opacity:0.12"></div>
    <div class="bg-blob blob-2" style="opacity:0.10"></div>

    <div
        style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;position:relative;z-index:1">

        <div style="width:100%;max-width:720px">

            <!-- Header -->
            <div class="text-center anim-fade-in-down" style="margin-bottom:32px">
                <div style="font-size:4rem;margin-bottom:8px" id="result-emoji">🎉</div>
                <h1 style="font-size:2rem;font-weight:900;font-family:var(--font-display)" id="result-title">Quiz
                    Complete!</h1>
                <p style="color:var(--text-secondary);margin-top:6px" id="result-sub">Here's how you did</p>
            </div>

            <!-- Score circle + stats row -->
            <div class="card anim-scale-in" style="padding:36px;margin-bottom:24px">
                <div style="display:flex;align-items:center;gap:40px;flex-wrap:wrap;justify-content:center">

                    <!-- Circle -->
                    <div class="score-circle">
                        <svg width="160" height="160" viewBox="0 0 160 160">
                            <circle class="sc-bg" cx="80" cy="80" r="70" />
                            <circle class="sc-fill" cx="80" cy="80" r="70" id="score-fill" stroke-dashoffset="440" />
                        </svg>
                        <div class="score-inner">
                            <div class="score-pct gradient-text" id="score-pct">0%</div>
                            <div class="score-label">Your Score</div>
                        </div>
                    </div>

                    <!-- Stats -->
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;flex:1;min-width:220px">
                        <div class="card" style="text-align:center;padding:16px">
                            <div style="font-size:1.8rem;font-weight:800;color:var(--green)" id="stat-correct">—</div>
                            <div style="font-size:0.78rem;color:var(--text-secondary)">Correct</div>
                        </div>
                        <div class="card" style="text-align:center;padding:16px">
                            <div style="font-size:1.8rem;font-weight:800;color:var(--red)" id="stat-wrong">—</div>
                            <div style="font-size:0.78rem;color:var(--text-secondary)">Wrong</div>
                        </div>
                        <div class="card" style="text-align:center;padding:16px">
                            <div style="font-size:1.8rem;font-weight:800;color:var(--cyan)" id="stat-time">—</div>
                            <div style="font-size:0.78rem;color:var(--text-secondary)">Time</div>
                        </div>
                        <div class="card" style="text-align:center;padding:16px">
                            <div style="font-size:1.8rem;font-weight:800;color:var(--amber)" id="stat-cat">—</div>
                            <div style="font-size:0.78rem;color:var(--text-secondary)">Category</div>
                        </div>
                    </div>

                </div>
            </div>

            <!-- Actions -->
            <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:28px" class="anim-fade-in-up delay-3">
                <button id="retry-btn" class="btn btn-primary" style="flex:1;min-width:160px">⚡ Try Again</button>
                <a href="dashboard.html" class="btn btn-secondary"
                    style="flex:1;min-width:160px;display:inline-flex;justify-content:center">📊 Dashboard</a>
                <a href="leaderboard.html" class="btn btn-secondary"
                    style="flex:1;min-width:160px;display:inline-flex;justify-content:center">🏆 Leaderboard</a>
            </div>

            <!-- Breakdown -->
            <div class="anim-fade-in-up delay-4">
                <h2 style="font-size:1.1rem;font-weight:700;margin-bottom:16px">📋 Answer Breakdown</h2>
                <div id="breakdown-list" style="display:flex;flex-direction:column;gap:12px"></div>
            </div>

        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            SR.redirectIfNotLoggedIn();
            const result = JSON.parse(localStorage.getItem('skillrank_last_result') || 'null');
            if (!result) { window.location.href = 'dashboard.html'; return; }

            const score = result.score;
            renderScore(score);
            renderStats(result);
            renderBreakdown(result.breakdown);
            if (score >= 80) SR.launchConfetti();

            document.getElementById('retry-btn').onclick = () => {
                window.location.href = 'quiz.html?cat=' + result.category;
            };
        });

        function renderScore(score) {
            const fill = document.getElementById('score-fill');
            const pctEl = document.getElementById('score-pct');
            const emoji = document.getElementById('result-emoji');
            const title = document.getElementById('result-title');
            const sub = document.getElementById('result-sub');

            const offset = 440 - (score / 100) * 440;
            const color = score >= 80 ? '#10b981' : score >= 60 ? '#f59e0b' : '#ef4444';

            setTimeout(() => {
                fill.style.strokeDashoffset = offset;
                fill.style.stroke = color;
                // Animate pct counter
                let cur = 0;
                const step = Math.max(1, Math.floor(score / 40));
                const timer = setInterval(() => {
                    cur = Math.min(cur + step, score);
                    pctEl.textContent = cur + '%';
                    if (cur >= score) clearInterval(timer);
                }, 30);
            }, 300);

            if (score === 100) { emoji.textContent = '🏆'; title.textContent = 'Perfect Score!'; sub.textContent = 'Outstanding! You got every question right!'; }
            else if (score >= 80) { emoji.textContent = '🎉'; title.textContent = 'Excellent Work!'; sub.textContent = 'You\'re in the top percentile. Keep it up!'; }
            else if (score >= 60) { emoji.textContent = '👍'; title.textContent = 'Good Job!'; sub.textContent = 'A solid result. Review the wrong answers and try again.'; }
            else { emoji.textContent = '💪'; title.textContent = 'Keep Practicing!'; sub.textContent = 'Don\'t give up — practice makes perfect.'; }
        }

        function renderStats(result) {
            const setEl = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
            setEl('stat-correct', result.correct);
            setEl('stat-wrong', result.total - result.correct);
            setEl('stat-time', result.timeTaken ? SR.formatTime(result.timeTaken) : '—');
            const catEl = document.getElementById('stat-cat');
            const catEmojis = { javascript: '⚡', python: '🐍', html: '🌐', css: '🎨', general: '🧠' };
            if (catEl) { catEl.textContent = catEmojis[result.category] || '📝'; catEl.title = result.category; }
        }

        function renderBreakdown(breakdown) {
            const container = document.getElementById('breakdown-list');
            if (!breakdown || !container) return;
            const letters = ['A', 'B', 'C', 'D'];
            container.innerHTML = breakdown.map((item, i) => {
                const selLetter = item.selected !== null ? letters[item.selected] : '—';
                const corLetter = letters[item.correct];
                return `
        <div class="card ${item.isCorrect ? 'correct-flash' : 'wrong-shake'}" style="padding:16px;border-color:${item.isCorrect ? 'rgba(16,185,129,0.3)' : 'rgba(239,68,68,0.2)'}">
          <div style="display:flex;justify-content:space-between;align-items:start;gap:12px;flex-wrap:wrap">
            <div style="flex:1;min-width:200px">
              <div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:4px">Question ${i + 1}</div>
              <div style="font-size:0.9rem;font-weight:500">${item.question}</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
              ${item.isCorrect
                        ? `<span style="color:var(--green);font-weight:700;font-size:0.85rem">✓ Correct (${corLetter})</span>`
                        : `<span style="color:var(--red);font-size:0.85rem">✗ You: <b>${selLetter}</b> · Correct: <b>${corLetter}</b></span>`
                    }
            </div>
          </div>
          ${!item.isCorrect ? `<div style="margin-top:8px;padding:8px 12px;background:rgba(16,185,129,0.08);border-radius:8px;font-size:0.8rem;color:var(--green)">✓ ${item.options[item.correct]}</div>` : ''}
        </div>`;
            }).join('');
        }
    </script>
</body>

</html>
